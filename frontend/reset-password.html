<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - Digital Market Insights</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #2c7a7b 0%, #1e5a5b 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1rem;
    }
    
    .container {
      background: white;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 400px;
    }
    
    .header {
      text-align: center;
      margin-bottom: 2rem;
    }
    
    .header h1 {
      color: #2c7a7b;
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
    }
    
    .header p {
      color: #666;
      font-size: 0.95rem;
    }
    
    .form-group {
      margin-bottom: 1.2rem;
    }
    
    label {
      display: block;
      margin-bottom: 0.5rem;
      color: #333;
      font-weight: 500;
    }
    
    input {
      width: 100%;
      padding: 0.8rem;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      font-size: 1rem;
      transition: border-color 0.3s;
    }
    
    input:focus {
      outline: none;
      border-color: #2c7a7b;
    }
    
    .button-group {
      display: flex;
      gap: 1rem;
      margin-top: 1.5rem;
    }
    
    button {
      flex: 1;
      padding: 0.8rem;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
    }
    
    .btn-reset {
      background: #2c7a7b;
      color: white;
    }
    
    .btn-reset:hover {
      background: #1e5a5b;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(44, 122, 123, 0.3);
    }
    
    .btn-cancel {
      background: #f0f0f0;
      color: #333;
    }
    
    .btn-cancel:hover {
      background: #e0e0e0;
    }
    
    .message {
      margin-top: 1rem;
      padding: 1rem;
      border-radius: 6px;
      text-align: center;
      font-size: 0.95rem;
      display: none;
    }
    
    .message.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      display: block;
    }
    
    .message.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      display: block;
    }
    
    .message.loading {
      background: #e2e3e5;
      color: #383d41;
      display: block;
    }
    
    .icon {
      font-size: 2rem;
      margin-bottom: 1rem;
    }
    
    .link-back {
      text-align: center;
      margin-top: 1.5rem;
    }
    
    .link-back a {
      color: #2c7a7b;
      text-decoration: none;
      font-weight: 500;
    }
    
    .link-back a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="icon">🔐</div>
      <h1>Reset Password</h1>
      <p>Create a new password for your account</p>
    </div>
    
    <form id="resetForm">
      <div class="form-group">
        <label for="email">Email Address:</label>
        <input type="email" id="email" name="email" disabled placeholder="Loading...">
      </div>
      
      <div class="form-group">
        <label for="newPassword">New Password:</label>
        <input type="password" id="newPassword" name="newPassword" placeholder="Enter new password" required>
      </div>
      
      <div class="form-group">
        <label for="confirmPassword">Confirm Password:</label>
        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm password" required>
      </div>
      
      <div class="message" id="message"></div>
      
      <div class="button-group">
        <button type="submit" class="btn-reset" id="submitBtn">Reset Password</button>
        <button type="button" class="btn-cancel" onclick="goHome()">Cancel</button>
      </div>
    </form>
    
    <div class="link-back">
      <a href="index.html">← Back to Home</a>
    </div>
  </div>

  <script>
    const BACKEND_URL = 'http://localhost:5000/api/auth';
    
    // Get token from URL
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    const email = urlParams.get('email');
    
    const messageDiv = document.getElementById('message');
    const emailInput = document.getElementById('email');
    const form = document.getElementById('resetForm');
    
    // Verify token on page load
    async function verifyToken() {
      if (!token) {
        showMessage('Invalid reset link. Please request a new one.', 'error');
        disableForm();
        return;
      }
      
      try {
        const response = await fetch(`${BACKEND_URL}/verify-reset-token`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token })
        });
        
        const data = await response.json();
        
        if (data.success) {
          emailInput.value = data.email;
        } else {
          showMessage(data.message || 'Invalid or expired reset link', 'error');
          disableForm();
        }
      } catch (error) {
        console.error('Error:', error);
        showMessage('Something went wrong. Please try again.', 'error');
        disableForm();
      }
    }
    
    function showMessage(text, type) {
      messageDiv.textContent = text;
      messageDiv.className = `message ${type}`;
    }
    
    function disableForm() {
      form.style.opacity = '0.5';
      form.style.pointerEvents = 'none';
    }
    
    function goHome() {
      window.location.href = 'index.html';
    }
    
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      
      if (newPassword !== confirmPassword) {
        showMessage('Passwords do not match!', 'error');
        return;
      }
      
      if (newPassword.length < 6) {
        showMessage('Password must be at least 6 characters long', 'error');
        return;
      }
      
      showMessage('Resetting password...', 'loading');
      
      try {
        const response = await fetch(`${BACKEND_URL}/reset-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, newPassword })
        });
        
        const data = await response.json();
        
        if (data.success) {
          showMessage('✓ ' + data.message, 'success');
          setTimeout(() => {
            window.location.href = 'index.html';
          }, 2000);
        } else {
          showMessage(data.message || 'Failed to reset password', 'error');
        }
      } catch (error) {
        console.error('Error:', error);
        showMessage('Something went wrong. Please try again.', 'error');
      }
    });
    
    // Verify token when page loads
    verifyToken();
  </script>
</body>
</html>
