<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crop Rotation Advisor</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #e8f5e8 0%, #c8e6c9 50%, #a5d6a7 100%);
  min-height: 100vh;
  padding: 20px;
  position: relative;
}

.back-btn {
  position: fixed;
  top: 25px;
  left: 25px;
  background: linear-gradient(135deg, #2e7d32, #1b5e20);
  color: white;
  border: none;
  width: 180px;
  height: 55px;
  border-radius: 30px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  box-shadow: 0 10px 30px rgba(46, 125, 50, 0.4);
  z-index: 1000;
  transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}

.back-btn:hover {
  transform: translateY(-5px) scale(1.02);
  box-shadow: 0 15px 40px rgba(46, 125, 50, 0.6);
  background: linear-gradient(135deg, #38a148, #2e7d32);
}

.crop-container {
  max-width: 520px;
  margin: 120px auto 40px;
  padding: 50px;
  background: rgba(255, 255, 255, 0.97);
  backdrop-filter: blur(20px);
  border-radius: 30px;
  box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2);
  border: 1px solid rgba(255, 255, 255, 0.3);
  animation: floatIn 1s ease-out;
  position: relative;
  overflow: hidden;
}

.crop-container::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 6px;
  background: linear-gradient(90deg, #4caf50, #81c784, #a5d6a7, #66bb6a, #4caf50);
  background-size: 300% 100%;
  animation: shimmer 3s infinite;
}

.crop-container::after {
  content: '';
  position: absolute;
  top: 20px;
  right: -50px;
  width: 100px;
  height: 100px;
  background: radial-gradient(circle, rgba(76, 175, 80, 0.1) 0%, transparent 70%);
  border-radius: 50%;
  animation: pulseGlow 4s infinite;
}

.crop-header {
  text-align: center;
  margin-bottom: 40px;
  position: relative;
}

.crop-container h2 {
  font-size: 32px;
  font-weight: 800;
  background: linear-gradient(135deg, #2e7d32, #4caf50, #66bb6a);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 10px;
}

.illustration {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-bottom: 40px;
  width: 100%;
}

.crop-icon, .soil-icon {
  width: 60px;
  height: 60px;
  background: linear-gradient(135deg, #e8f5e8, #c8e6c9);
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  box-shadow: 0 8px 20px rgba(76, 175, 80, 0.2);
  transition: all 0.3s ease;
}

.form-group {
  margin-bottom: 30px;
  position: relative;
}

.crop-container label {
  font-size: 16px;
  font-weight: 700;
  color: #2f4f4f;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.select-wrapper {
  position: relative;
}

.crop-container select {
  width: 100%;
  padding: 20px 25px;
  border-radius: 20px;
  border: 2px solid #e0f2e9;
  font-size: 16px;
  background: linear-gradient(135deg, #f8fff8, #f1f8e9);
  color: #2f4f4f;
  font-weight: 600;
  transition: all 0.4s ease;
  appearance: none;
  background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%232e7d32' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='m6 8 4 4 4-4'/%3e%3c/svg%3e");
  background-position: right 20px center;
  background-repeat: no-repeat;
  background-size: 20px;
  padding-right: 60px;
  cursor: pointer;
}

.crop-container select:focus {
  outline: none;
  border-color: #4caf50;
  box-shadow: 0 0 0 4px rgba(76, 175, 80, 0.15), 0 10px 30px rgba(76, 175, 80, 0.2);
  transform: translateY(-3px);
}

.crop-container select option {
  padding: 10px;
  font-size: 16px;
}

.rotate-btn {
  width: 100%;
  padding: 22px;
  margin-top: 15px;
  border: none;
  font-size: 18px;
  font-weight: 800;
  color: white;
  background: linear-gradient(135deg, #4caf50, #2e7d32, #1b5e20);
  border-radius: 25px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  box-shadow: 0 12px 35px rgba(76, 175, 80, 0.4);
  transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  text-transform: uppercase;
  letter-spacing: 1.2px;
}

.rotate-btn::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
  transition: left 0.6s;
}

.rotate-btn:hover::before {
  left: 100%;
}

.rotate-btn:hover {
  transform: translateY(-5px) scale(1.02);
  box-shadow: 0 20px 45px rgba(76, 175, 80, 0.6);
}

.rotate-btn:active {
  transform: translateY(-2px);
}

#recommendation {
  margin-top: 30px;
  background: linear-gradient(135deg, #e8f5e9, #c8e6c9, #a5d6a7);
  padding: 30px;
  border-radius: 25px;
  border: 2px solid rgba(76, 175, 80, 0.3);
  animation: slideUp 0.8s ease-out;
  text-align: center;
  font-size: 18px;
  font-weight: 600;
  color: #2e7d32;
  box-shadow: 0 15px 40px rgba(76, 175, 80, 0.25);
  position: relative;
  opacity: 0;
  transform: scale(0.9);
}

#recommendation.show {
  opacity: 1;
  transform: scale(1);
}

#recommendation::before {
  content: '✅';
  font-size: 32px;
  display: block;
  margin-bottom: 15px;
}

.recommendation-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin: 20px 0;
}

.crop-suggestion {
  background: rgba(255, 255, 255, 0.8);
  padding: 15px 20px;
  border-radius: 15px;
  border-left: 5px solid #4caf50;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  transition: all 0.3s ease;
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 18px;
}

.crop-suggestion:hover {
  transform: translateX(10px);
  box-shadow: 0 8px 25px rgba(76, 175, 80, 0.2);
}

@keyframes floatIn {
  from { 
    opacity: 0; 
    transform: translateY(50px) scale(0.9);
  }
  to { 
    opacity: 1; 
    transform: translateY(0) scale(1);
  }
}

@keyframes slideUp {
  from { 
    opacity: 0; 
    transform: translateY(30px) scale(0.9);
  }
  to { 
    opacity: 1; 
    transform: translateY(0) scale(1);
  }
}

@keyframes shimmer {
  0% { background-position: 300% 0; }
  100% { background-position: -300% 0; }
}

@keyframes pulseGlow {
  0%, 100% { transform: scale(1); opacity: 0.6; }
  50% { transform: scale(1.2); opacity: 1; }
}

@media (max-width: 600px) {
  .back-btn {
    top: 20px;
    left: 20px;
    width: 160px;
    height: 50px;
    font-size: 15px;
  }
  
  .crop-container {
    margin: 100px auto 30px;
    padding: 35px 25px;
  }
  
  .crop-container h2 {
    font-size: 26px;
  }
}
</style>
</head>

<body>
<button class="back-btn" onclick="goBack()">
  ⬅ Back to Dashboard
</button>

<div class="crop-container">
  <div class="crop-header">
    <h2>Crop Rotation Advisor</h2>
    <div class="illustration">
      <div class="soil-icon">Soil</div>
      <div class="crop-icon">Crop Next➜</div>
      <div class="soil-icon">Yield</div>
    </div>
  </div>
  
  <div class="form-group">
    <label for="soilSelect">🌍 Soil Type:</label>
    <div class="select-wrapper">
      <select id="soilSelect">
        <option value="">-- Choose Soil Type --</option>
        <option value="loamy">🌾 Loamy Soil</option>
        <option value="clay">🪨 Clay Soil</option>
        <option value="sandy">🏜️ Sandy Soil</option>
        <option value="black">⚫ Black Soil</option>
        <option value="red">🔴 Red Soil</option>
        <option value="alluvial">🏞️ Alluvial Soil</option>
        <option value="laterite">🟤 Laterite Soil</option>
      </select>
    </div>
  </div>

  <div class="form-group">
    <label for="cropSelect">🌾 Previous Crop:</label>
    <div class="select-wrapper">
      <select id="cropSelect">
        <option value="">-- Select Previous Crop --</option>
        <option value="wheat">🌾 Wheat</option>
        <option value="maize">🌽 Maize</option>
        <option value="soybean">🌱 Soybean</option>
        <option value="groundnut">🥜 Groundnut</option>
        <option value="rice">🌾 Rice</option>
        <option value="cotton">🌱 Cotton</option>
        <option value="millet">🌾 Millet</option>
        <option value="sorghum">🌾 Sorghum</option>
        <option value="pulses">🌱 Pulses</option>
        <option value="barley">🌾 Barley</option>
      </select>
    </div>
  </div>

  <button class="rotate-btn" id="recommendBtn">Get Smart Recommendation</button>

  <div id="recommendation"></div>
</div>

<script>
function goBack() {
  window.location.href = "index.html";
}

// Crop rotation logic with emojis beside crops
const cropRotationData = {
  loamy: {
    wheat: ["🌽 Maize", "🌱 Soybean", "🌿 Pulses"],
    maize: ["🌾 Wheat", "🌿 Pulses", "🌾 Sorghum"],
    soybean: ["🌾 Wheat", "🌽 Maize", "🌱 Cotton"],
    groundnut: ["🌿 Pulses", "🌽 Maize", "🌾 Sorghum"],
    rice: ["🌿 Pulses", "🌽 Maize", "🌾 Wheat"],
    cotton: ["🌿 Pulses", "🌾 Sorghum", "🌾 Wheat"],
    millet: ["🌾 Wheat", "🌽 Maize", "🌱 Soybean"],
    sorghum: ["🌾 Wheat", "🌿 Pulses", "🌱 Cotton"],
    pulses: ["🌽 Maize", "🌱 Cotton", "🌾 Sorghum"],
    barley: ["🌽 Maize", "🌱 Soybean", "🌿 Pulses"]
  },
  clay: {
    wheat: ["🌽 Maize", "🌿 Pulses", "🌾 Sorghum"],
    maize: ["🌾 Wheat", "🌱 Soybean", "🌱 Cotton"],
    soybean: ["🌾 Wheat", "🌾 Sorghum", "🌿 Pulses"],
    groundnut: ["🌿 Pulses", "🌽 Maize", "🌾 Wheat"],
    rice: ["🌿 Pulses", "🌾 Sorghum", "🌽 Maize"],
    cotton: ["🌾 Wheat", "🌿 Pulses", "🌱 Soybean"],
    millet: ["🌽 Maize", "🌾 Wheat", "🌱 Cotton"],
    sorghum: ["🌾 Wheat", "🌿 Pulses", "🌽 Maize"],
    pulses: ["🌽 Maize", "🌱 Cotton", "🌾 Sorghum"],
    barley: ["🌽 Maize", "🌱 Soybean", "🌾 Wheat"]
  },
  sandy: {
    wheat: ["🌿 Pulses", "🌾 Sorghum", "🌽 Maize"],
    maize: ["🌾 Wheat", "🌱 Cotton", "🌿 Pulses"],
    soybean: ["🌾 Wheat", "🌾 Sorghum", "🌽 Maize"],
    groundnut: ["🌾 Sorghum", "🌿 Pulses", "🌾 Wheat"],
    rice: ["🌿 Pulses", "🌽 Maize", "🌾 Sorghum"],
    cotton: ["🌾 Wheat", "🌿 Pulses", "🌽 Maize"],
    millet: ["🌾 Wheat", "🌱 Cotton", "🌾 Sorghum"],
    sorghum: ["🌾 Wheat", "🌿 Pulses", "🌽 Maize"],
    pulses: ["🌽 Maize", "🌾 Sorghum", "🌱 Cotton"],
    barley: ["🌽 Maize", "🌿 Pulses", "🌾 Wheat"]
  },
  black: {
    wheat: ["🌱 Cotton", "🌽 Maize", "🌿 Pulses"],
    maize: ["🌱 Soybean", "🌾 Sorghum", "🌾 Wheat"],
    soybean: ["🌱 Cotton", "🌾 Wheat", "🌿 Pulses"],
    groundnut: ["🌾 Sorghum", "🌽 Maize", "🌱 Cotton"],
    rice: ["🌿 Pulses", "🌱 Soybean", "🌾 Wheat"],
    cotton: ["🌽 Maize", "🌿 Pulses", "🌾 Sorghum"],
    millet: ["🌾 Wheat", "🌱 Soybean", "🌽 Maize"],
    sorghum: ["🌱 Cotton", "🌿 Pulses", "🌾 Wheat"],
    pulses: ["🌽 Maize", "🌱 Cotton", "🌾 Sorghum"],
    barley: ["🌱 Soybean", "🌽 Maize", "🌿 Pulses"]
  }
};

document.getElementById('recommendBtn').addEventListener('click', function() {
  const soil = document.getElementById('soilSelect').value;
  const prevCrop = document.getElementById('cropSelect').value;
  const recommendation = document.getElementById('recommendation');

  if (!soil || !prevCrop) {
    recommendation.innerHTML = '<strong>Please select both soil type and previous crop!</strong>';
    recommendation.classList.add('show');
    return;
  }

  const recommendations = cropRotationData[soil]?.[prevCrop] || 
    ['🌽 Maize', '🌿 Pulses', '🌾 Sorghum', '🌾 Wheat'];

  recommendation.innerHTML = `
    <div class="recommendation-list">
      ${recommendations.map(crop => `<div class="crop-suggestion">${crop}</div>`).join('')}
    </div>
    <small style="color: #4caf50; font-weight: 600;">These crops optimize soil health & boost yield!</small>
  `;
  recommendation.classList.add('show');
});
</script>
</body>
</html>
